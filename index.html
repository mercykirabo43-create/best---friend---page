<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Friend 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  text-align: center;
  color: white;
}

h1 {
  font-size: 2.5em;
  margin-bottom: 20px;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

#yes {
  background: #4CAF50;
  color: white;
}

#no {
  background: #f44336;
  color: white;
  position: absolute;
}

.heart {
  position: absolute;
  color: white;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh) scale(0.5); opacity: 1; }
  to { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

#message {
  display: none;
  font-size: 2em;
  margin-top: 20px;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px white; }
  to { text-shadow: 0 0 20px #fff, 0 0 30px pink; }
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text"></h1>

  <div>
    <button id="yes" onclick="sayYes()">Yes 💖</button>
    <button id="no" onmouseover="moveNo(this)">No 😏</button>
  </div>

  <div id="message">Yay! You are my best friend 💕</div>
</div>

<script>
// typing effect
let text = "Are you my best friend? 💖";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 80);
  }
}
type();

// moving NO button
function moveNo(btn) {
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

// YES action
function sayYes() {
  document.getElementById("message").style.display = "block";
  createHearts();
}

// floating hearts
function createHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 200);
}
</script>

</body>
</html>
